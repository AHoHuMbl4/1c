# SereneDB configuration (absl flagfile: один --flag=value в строке).
# serened читает через --flagfile=/etc/serenedb/serened.conf.
# Полный список флагов: serened --helpfull

# Каталог данных (persistent; переживает рестарт/ребут).
--server_directory=/var/lib/serenedb

# Слушаем ТОЛЬКО loopback — наружу не выставляем (данные компании).
# Для выноса за пределы хоста: добавить --hba_config / --auth_* / --tls_* и сменить адрес.
--listen=postgres://127.0.0.1:7890

# Логи в stdout -> journald (journalctl -u serenedb).
--log_level=info
--log_storage=stdout
